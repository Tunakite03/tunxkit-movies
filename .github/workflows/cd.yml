name: CD

on:
   push:
      branches: [main]

concurrency:
   group: cd-production
   cancel-in-progress: false

# Vercel auto-deploys on push to main via its GitHub integration.
# This workflow is intentionally left as a no-op to avoid duplicate deploys.
jobs:
   deploy:
      name: Deploy (Vercel auto-deploy)
      runs-on: ubuntu-latest
      steps:
         - run: echo "Vercel handles deployment automatically via GitHub integration."
