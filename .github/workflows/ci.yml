name: CI

on:
   pull_request:
      branches: [main, develop]
   push:
      branches: [main, develop]

concurrency:
   group: ci-${{ github.ref }}
   cancel-in-progress: true

jobs:
   lint:
      name: Lint
      runs-on: ubuntu-latest
      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Setup pnpm
           uses: pnpm/action-setup@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 20
              cache: pnpm

         - name: Install dependencies
           run: pnpm install --frozen-lockfile

         - name: Run ESLint
           run: pnpm lint

   typecheck:
      name: Type Check
      runs-on: ubuntu-latest
      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Setup pnpm
           uses: pnpm/action-setup@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 20
              cache: pnpm

         - name: Install dependencies
           run: pnpm install --frozen-lockfile

         - name: Run TypeScript type check
           run: pnpm exec tsc --noEmit

   build:
      name: Build
      runs-on: ubuntu-latest
      needs: [lint, typecheck]
      env:
         TMDB_API_KEY: ${{ secrets.TMDB_API_KEY || 'ci-placeholder-key' }}
      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Setup pnpm
           uses: pnpm/action-setup@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 20
              cache: pnpm

         - name: Install dependencies
           run: pnpm install --frozen-lockfile

         - name: Build Next.js app
           run: pnpm build
